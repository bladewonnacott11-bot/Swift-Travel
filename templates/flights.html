{% extends "base.html" %}
{% block content %}
<div class="jumbotron-premium">
    <h2 class="mb-4">✈️ Search Flights</h2>
    <form action="/search/flights" method="POST" class="row g-3">
        <div class="col-md-5">
            <label>From (City/Country)</label>
            <input type="text" name="origin" class="form-control" placeholder="e.g., London" required>
        </div>
        <div class="col-md-5">
            <label>To (City/Country)</label>
            <input type="text" name="destination" class="form-control" placeholder="e.g., Paris" required>
        </div>
        <div class="col-md-2">
            <label>Departure Date</label>
            <input type="date" name="departureDate" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label>Adults</label>
            <input type="number" name="adults" class="form-control" value="1" min="1">
        </div>
        <div class="col-md-3">
            <label>Max Price (USD)</label>
            <input type="number" name="maxPrice" class="form-control" placeholder="Optional">
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary">Search on Skyscanner</button>
        </div>
    </form>
</div>
{% endblock %}
