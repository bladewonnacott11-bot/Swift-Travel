{% extends "base.html" %}
{% block content %}
<div class="jumbotron-premium text-center">
    <h1 class="display-4 fw-bold mb-3">Find Your Perfect Trip</h1>
    <p class="lead mb-4">Search flights, hotels, or car rentals – all in one place</p>

    <div class="premium-card p-4" style="max-width: 1000px; margin: 0 auto;">
        <div class="mb-4">
            <label class="form-label fw-semibold">I want to book:</label>
            <div class="btn-group w-100" role="group">
                <button type="button" class="btn btn-outline-primary active" id="btn-flight">✈️ Flight</button>
                <button type="button" class="btn btn-outline-primary" id="btn-hotel">🏨 Hotel</button>
                <button type="button" class="btn btn-outline-primary" id="btn-car">🚗 Car</button>
            </div>
        </div>

        <!-- FLIGHT FORM with Max Price -->
        <form id="flight-form" action="/search/flights" method="POST" class="search-form">
            <div class="row g-3">
                <div class="col-12 col-md-5">
                    <label class="form-label">From (Country/City)</label>
                    <input type="text" name="origin" class="form-control form-control-premium" placeholder="e.g., United Kingdom, London" required>
                </div>
                <div class="col-12 col-md-5">
                    <label class="form-label">To (Country/City)</label>
                    <input type="text" name="destination" class="form-control form-control-premium" placeholder="e.g., France, Paris" required>
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label">Departure Date</label>
                    <input type="date" name="departureDate" class="form-control form-control-premium" required>
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label">Adults</label>
                    <input type="number" name="adults" class="form-control form-control-premium" value="1" min="1">
                </div>
                <!-- MAX PRICE for flights -->
                <div class="col-12 col-md-3">
                    <label class="form-label">💰 Max Price (USD)</label>
                    <input type="number" name="maxPrice" class="form-control form-control-premium" placeholder="e.g., 500" min="0" step="10">
                </div>
                <div class="col-12 d-grid">
                    <button type="submit" class="btn-premium w-100 mt-3">Search Flights on Skyscanner</button>
                </div>
            </div>
        </form>

        <!-- HOTEL FORM with Max Price -->
        <form id="hotel-form" action="/search/hotels" method="POST" class="search-form" style="display: none;">
            <div class="row g-3">
                <div class="col-12 col-md-6">
                    <label class="form-label">Destination (City / Country)</label>
                    <input type="text" name="entityId" class="form-control form-control-premium" placeholder="e.g., Paris, France" required>
                </div>
                <div class="col-6 col-md-3">
                    <label class="form-label">Check-in</label>
                    <input type="date" name="checkIn" class="form-control form-control-premium" required>
                </div>
                <div class="col-6 col-md-3">
                    <label class="form-label">Check-out</label>
                    <input type="date" name="checkOut" class="form-control form-control-premium" required>
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label">Guests</label>
                    <input type="number" name="guests" class="form-control form-control-premium" value="2" min="1">
                </div>
                <!-- MAX PRICE for hotels -->
                <div class="col-6 col-md-3">
                    <label class="form-label">💰 Max Price per Night (USD)</label>
                    <input type="number" name="maxPrice" class="form-control form-control-premium" placeholder="e.g., 200" min="0" step="10">
                </div>
                <div class="col-12 d-grid">
                    <button type="submit" class="btn-premium w-100 mt-3">Search Hotels on Skyscanner</button>
                </div>
            </div>
        </form>

        <!-- CAR FORM with Max Price -->
        <form id="car-form" action="/search/cars" method="POST" class="search-form" style="display: none;">
            <div class="row g-3">
                <div class="col-12 col-md-5">
                    <label class="form-label">Pick-up Location (City / Airport)</label>
                    <input type="text" name="pickupLocation" class="form-control form-control-premium" placeholder="e.g., London" required>
                </div>
                <div class="col-12 col-md-5">
                    <label class="form-label">Drop-off Location</label>
                    <input type="text" name="dropoffLocation" class="form-control form-control-premium" placeholder="Same as pick-up">
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label">Pick-up Date</label>
                    <input type="date" name="pickupDate" class="form-control form-control-premium" required>
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label">Drop-off Date</label>
                    <input type="date" name="dropoffDate" class="form-control form-control-premium" required>
                </div>
                <!-- MAX PRICE for cars -->
                <div class="col-12 col-md-3">
                    <label class="form-label">💰 Max Price per Day (USD)</label>
                    <input type="number" name="maxPrice" class="form-control form-control-premium" placeholder="e.g., 80" min="0" step="10">
                </div>
                <div class="col-12 d-grid">
                    <button type="submit" class="btn-premium w-100 mt-3">Search Cars on Skyscanner</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    const btnFlight = document.getElementById('btn-flight');
    const btnHotel = document.getElementById('btn-hotel');
    const btnCar = document.getElementById('btn-car');
    const flightForm = document.getElementById('flight-form');
    const hotelForm = document.getElementById('hotel-form');
    const carForm = document.getElementById('car-form');

    function setActive(activeBtn, activeForm) {
        [btnFlight, btnHotel, btnCar].forEach(btn => btn.classList.remove('active'));
        activeBtn.classList.add('active');
        [flightForm, hotelForm, carForm].forEach(form => form.style.display = 'none');
        activeForm.style.display = 'block';
    }

    btnFlight.addEventListener('click', () => setActive(btnFlight, flightForm));
    btnHotel.addEventListener('click', () => setActive(btnHotel, hotelForm));
    btnCar.addEventListener('click', () => setActive(btnCar, carForm));
</script>
{% endblock %}
