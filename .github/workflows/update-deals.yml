name: Update Deals
on:
  schedule: [cron: '0 8 * * *']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install requests
      - run: python travel_fetcher.py
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          FLIGHT_ORIGIN: ${{ secrets.FLIGHT_ORIGIN }}
          FLIGHT_DESTINATION: ${{ secrets.FLIGHT_DESTINATION }}
          FLIGHT_DEPART_DATE: ${{ secrets.FLIGHT_DEPART_DATE }}
      - run: |
          git config user.name bot
          git config user.email bot@github.com
          git add data/deals.json
          git diff --quiet || git commit -m "Update deals"
          git push
