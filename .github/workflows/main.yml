name: Update Travel Deals

on:
  schedule:
    # Runs every day at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:   # Allows manual trigger from Actions tab

permissions:
  contents: write      # Required to push updated deals.json back to repo

jobs:
  update-deals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run travel fetcher
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          FLIGHT_ORIGIN: ${{ secrets.FLIGHT_ORIGIN }}
          FLIGHT_DESTINATION: ${{ secrets.FLIGHT_DESTINATION }}
          FLIGHT_DEPART_DATE: ${{ secrets.FLIGHT_DEPART_DATE }}
          CURRENCY: ${{ secrets.CURRENCY }}
          LOCALE: ${{ secrets.LOCALE }}
          MARKET: ${{ secrets.MARKET }}
          ADULTS: ${{ secrets.ADULTS }}
          HOTEL_CITY: ${{ secrets.HOTEL_CITY }}
          CHECKIN_DATE: ${{ secrets.CHECKIN_DATE }}
          CHECKOUT_DATE: ${{ secrets.CHECKOUT_DATE }}
          ROOMS: ${{ secrets.ROOMS }}
          GUESTS: ${{ secrets.GUESTS }}
          CAR_PICKUP_PLACE: ${{ secrets.CAR_PICKUP_PLACE }}
          CAR_DROPOFF_PLACE: ${{ secrets.CAR_DROPOFF_PLACE }}
          CAR_PICKUP_DATE: ${{ secrets.CAR_PICKUP_DATE }}
          CAR_DROPOFF_DATE: ${{ secrets.CAR_DROPOFF_DATE }}
          DRIVER_AGE: ${{ secrets.DRIVER_AGE }}
        run: python travel_fetcher.py

      - name: Commit and push updated deals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/deals.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update travel deals [skip ci]"
          git push
